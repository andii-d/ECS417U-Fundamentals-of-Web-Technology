<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise</title>

    <style>
        div {
            background-color: silver;
        }

        strong {
            font-size: 24pt;
        }

        p, ul {
            background-color: green;
            font-size: 24pt;
        }

        #cool, .shiny {
            background-color: silver;
        }

        a:hover {
            background-color: silver;
        }

        ul a {
            color: orange;
        }
    </style>
</head>

<body>

    <div>Example div</div>

    <p>Example paragraph</p>

    <ul>
        <li><a href="#">List link</a></li>
    </ul>

    <strong>Strong text</strong>

    <div id="cool">Cool ID</div>
    <div class="shiny">Shiny class</div>

</body>
</html>
